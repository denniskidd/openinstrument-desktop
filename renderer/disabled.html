<!DOCTYPE html>
<html>
  <head>
    <title>Instrument Not Enabled</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #09090b;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 2rem;
        -webkit-app-region: drag;
      }
      .icon {
        color: #f87171;
        margin-bottom: 4px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        color: #f4f4f5;
      }
      p {
        font-size: 13px;
        color: #a1a1aa;
        text-align: center;
        max-width: 400px;
        line-height: 1.5;
      }
      button {
        margin-top: 8px;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.2);
        color: #e4e4e7;
        padding: 7px 20px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 6px;
        font-family: inherit;
        transition: background 0.15s, border-color 0.15s;
        -webkit-app-region: no-drag;
      }
      button:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.4);
      }
    </style>
  </head>
  <body>
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
    </div>
    <h1>Instrument Not Enabled</h1>
    <p>This instrument has not been enabled for desktop use. Please contact your administrator.</p>
    <button onclick="window.electronAPI.exitApp()">Close</button>
  </body>
</html>
