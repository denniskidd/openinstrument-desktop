<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reservation | OpenInstrument</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-900 text-white text-xl font-sans h-screen w-screen flex">
    <!-- Floating Date/Time Box -->
    <div class="absolute top-8 right-12 text-right">
      <div id="date" class="text-lg"></div>
      <div id="time" class="text-4xl font-bold"></div>
    </div>

    <!-- Left Panel -->
    <div
      class="w-full p-12 flex flex-col justify-center items-center h-full space-y-8"
    >
      <div class="w-full text-center">
        <h2 class="text-5xl font-bold mb-2" id="welcome">Welcome</h2>
        <!-- <hr class="border-t border-gray-700 mb-8" /> -->
        <p id="info" class="text-2xl font-semibold">Loading reservation...</p>
      </div>

      <div class="flex flex-col items-center space-y-6">
        <button
          id="startBtn"
          onclick="startSession()"
          class="border border-white text-white py-3 px-8 text-4xl rounded-full hover:bg-white hover:text-gray-900 transition hidden"
        >
          Start Session
        </button>
      </div>

      <div class="absolute bottom-8 left-12 flex flex-col space-y-2">
        <div class="shrink-0 flex items-center">
          <div class="flex items-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="block text-gray-100 h-12 w-auto"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              {{
              $attributes
              }}
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 6.878V6a2.25 2.25 0 012.25-2.25h7.5A2.25 2.25 0 0118 6v.878m-12 0c.235-.083.487-.128.75-.128h10.5c.263 0 .515.045.75.128m-12 0A2.25 2.25 0 004.5 9v.878m13.5-3A2.25 2.25 0 0119.5 9v.878m0 0a2.246 2.246 0 00-.75-.128H5.25c-.263 0-.515.045-.75.128m15 0A2.25 2.25 0 0121 12v6a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 18v-6c0-.98.626-1.813 1.5-2.122"
              />
            </svg>
            <p class="text-gray-100 p-2 font-semibold text-2xl">OpenInstrument</p>
          </div>
          <div class="ml-4">
            <img
              src="assets/JHU.logo_horizontal.white.svg"
              alt="Logo"
              class="h-16 w-auto border-l pl-4"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="absolute bottom-8 right-12">
      <button
        id="bypassButton"
        onclick="startBypass()"
        class="border border-white text-white py-2 px-6 text-2xl rounded-full hover:bg-white hover:text-gray-900 transition hidden mr-2"
      >
        Bypass Mode
      </button>

      <button
        id="cancelBtn"
        onclick="redirectToLogin()"
        class="border border-red-500 text-white py-2 px-6 text-2xl rounded-full hover:bg-red-500 hover:text-white transition hidden"
      >
        Cancel (30)
      </button>
    </div>

    <script>
      let token, instrumentUuid, reservationId;
      let upcoming;

      window.electronAPI.onReservationData(async (data) => {
        token = data.token;
        instrumentUuid = data.instrumentUuid;

        const startBtn = document.getElementById("startBtn");
        const info = document.getElementById("info");
        const welcome = document.getElementById("welcome");

        document.getElementById("cancelBtn").classList.remove("hidden");

        const res = await fetch(
          `https://openinstrument.com/api/reservations?instrument_uuid=${instrumentUuid}`,
          {
            headers: { Authorization: `Bearer ${token}` },
          }
        );
        const reservation = await res.json();
        upcoming = reservation?.[0];

        welcome.innerText = `Welcome, ${data.username}`;

        if (upcoming?.id && upcoming?.starts_at) {
          const now = new Date();
          // Ensure UTC strings from the database are parsed as UTC, not local time.
          // Append 'Z' if no timezone offset is already present.
          const toUtc = (str) => /Z|[+-]\d{2}:?\d{2}$/.test(str) ? str : str.replace(' ', 'T') + 'Z';
          const startTime = new Date(toUtc(upcoming.starts_at));
          const endTime = new Date(toUtc(upcoming.ends_at));
          const bufferMin = 15;
          const bufferedStart = new Date(
            startTime.getTime() - bufferMin * 60000
          );

          if (now >= bufferedStart && now <= endTime) {
            reservationId = upcoming.id;
            const startTimeFormatted = startTime.toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });
            const endTimeFormatted = endTime.toLocaleTimeString(
              [],
              { hour: "2-digit", minute: "2-digit" }
            );
            info.innerText = `Upcoming Reservation: ${startTimeFormatted} – ${endTimeFormatted}`;
            startBtn.classList.remove("hidden");
          } else {
            info.innerText =
              "No valid reservation in the next 30 minutes. Please make one on OpenInstrument.";
          }
        } else {
          info.innerText =
            "No reservation found. Please make one on OpenInstrument.";
        }

        //check admin status
        await checkAdminStatus();
      });

      async function checkAdminStatus() {
        try {
          const response = await fetch(
            `https://openinstrument.com/api/instruments/${instrumentUuid}/admin-check`,
            {
              headers: { Authorization: `Bearer ${token}` },
            }
          );
          const data = await response.json();
          if (data.is_admin) {
            document.getElementById("bypassButton").classList.remove("hidden");
          }
        } catch (error) {
          console.error("Admin check failed:", error);
        }
      }

      function startSession() {
        window.electronAPI.sendStartSession({
          token,
          reservationId,
          endTime: upcoming.ends_at,
        });
      }

      function redirectToLogin() {
        clearInterval(countdownInterval);
        window.electronAPI.sendToken("logout-now");
      }

      function startBypass() {
        if (confirm("Enter Bypass Mode?")) {
          window.electronAPI.sendStartBypass({ token });
        }
      }

      function updateTime() {
        const now = new Date();
        document.getElementById("date").textContent = now.toLocaleDateString(
          undefined,
          {
            weekday: "long",
            month: "short",
            day: "numeric",
          }
        );
        document.getElementById("time").textContent = now.toLocaleTimeString(
          [],
          {
            hour: "2-digit",
            minute: "2-digit",
          }
        );
      }

      setInterval(updateTime, 1000);
      updateTime();

      let countdown = 30;
      const countdownInterval = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          clearInterval(countdownInterval);
        }
        const cancelBtn = document.getElementById("cancelBtn");
        cancelBtn.textContent = `Cancel (${countdown})`;
      }, 1000);

      // Automatically return to login screen after 30 seconds if no action is taken
      setTimeout(() => {
        redirectToLogin();
      }, 30000);
    </script>
  </body>
</html>
