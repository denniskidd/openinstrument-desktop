<!DOCTYPE html>
<html>
  <head>
    <title>Bypass Mode</title>
    <style>
      body {
        background: #222;
        color: #fff;
        font-family: sans-serif;
        font-size: 20px;
      }
      #container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 100vw;
        box-sizing: border-box;
        -webkit-app-region: drag;
        padding: 1rem 1.5rem;
      }
      button {
        background: red;
        border: none;
        padding: 10px 20px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        border-radius: 8px;
        -webkit-app-region: no-drag;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div>Bypass Mode</div>
      <div></div>
      <div>
        <button onclick="exitBypass()">Exit Bypass Mode</button>
      </div>
    </div>

    <script>
      function exitBypass() {
        window.electronAPI.sendExitBypass();
      }
    </script>
  </body>
</html>
