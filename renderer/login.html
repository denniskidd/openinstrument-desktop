<!DOCTYPE html>
<html>
  <head>
    <title>Instrument Setup</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #09090b;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        height: 100vh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        -webkit-app-region: drag;
      }
      .card {
        background: #18181b;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px;
        padding: 2.5rem 2.5rem;
        width: 440px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        -webkit-app-region: no-drag;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
      }
      .brand-icon {
        width: 32px;
        height: 32px;
        background: #7069DA;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .brand-icon svg {
        width: 18px;
        height: 18px;
        color: #fff;
      }
      .brand-name {
        font-size: 16px;
        font-weight: 600;
        color: #f4f4f5;
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        color: #f4f4f5;
        line-height: 1.3;
      }
      p.subtitle {
        font-size: 13px;
        color: #71717a;
        line-height: 1.5;
        margin-top: 6px;
      }
      label {
        font-size: 12px;
        font-weight: 500;
        color: #a1a1aa;
        display: block;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        background: #09090b;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 7px;
        padding: 10px 14px;
        font-size: 14px;
        color: #f4f4f5;
        font-family: 'SF Mono', 'Fira Mono', monospace;
        outline: none;
        transition: border-color 0.15s;
      }
      input::placeholder {
        color: #52525b;
      }
      input:focus {
        border-color: #7069DA;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      button#saveButton {
        width: 100%;
        background: #7069DA;
        border: none;
        border-radius: 7px;
        padding: 10px;
        font-size: 14px;
        font-weight: 500;
        color: #fff;
        cursor: pointer;
        font-family: inherit;
        transition: opacity 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      button#saveButton:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      button#saveButton:not(:disabled):hover {
        opacity: 0.88;
      }
      button#exitButton {
        width: 100%;
        background: transparent;
        border: 1px solid rgba(239, 68, 68, 0.4);
        border-radius: 7px;
        padding: 9px;
        font-size: 13px;
        font-weight: 500;
        color: #f87171;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.15s, border-color 0.15s;
      }
      button#exitButton:hover {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.7);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <div class="brand-icon">
          <svg width="18px" height="18px" viewBox="0 0 24 24" stroke-width="1.5" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 12C3.00015 8.14286 4.28571 3 6.85714 3C10.7143 2.9999 13.2857 21 17.1429 21C19.7143 21 21 15.8571 21 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M3 12H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M19 12H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M15.5 12H16.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M7.5 12H8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
        <span class="brand-name">OpenInstrument</span>
      </div>

      <div>
        <h1>Activate Instrument</h1>
        <p class="subtitle">Enter the activation code for this instrument to connect it to OpenInstrument.</p>
      </div>

      <div>
        <label for="instrumentId">Activation Code</label>
        <input
          id="instrumentId"
          type="text"
          placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="actions">
        <button id="saveButton" onclick="save()" disabled>Activate</button>
        <button id="exitButton" onclick="exitApp()">Exit</button>
      </div>
    </div>

    <script>
      const input = document.getElementById("instrumentId");
      const saveBtn = document.getElementById("saveButton");
      const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;

      input.addEventListener("input", () => {
        saveBtn.disabled = !uuidRegex.test(input.value.trim());
      });

      async function save() {
        const id = input.value.trim();

        if (!uuidRegex.test(id)) {
          alert("Please enter a valid activation code.");
          return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<div class="spinner"></div> Verifying...';

        try {
          const response = await fetch(`https://openinstrument.com/api/instruments/${id}`);

          if (!response.ok) {
            throw new Error("Instrument not found.");
          }

          const instrument = await response.json();

          if (!instrument.desktop_enabled) {
            alert("This instrument has not been enabled for desktop use. Please contact your administrator.");
            saveBtn.innerHTML = "Activate";
            saveBtn.disabled = false;
            return;
          }

          window.electronAPI.sendToken(
            `save-instrument:${JSON.stringify({
              instrumentUuid: id,
              instrumentName: instrument.name,
              instrumentDescription: instrument.description,
            })}`
          );
        } catch (error) {
          alert("Instrument could not be verified. Please check your activation code.");
          saveBtn.innerHTML = "Activate";
          saveBtn.disabled = false;
        }
      }

      function exitApp() {
        window.electronAPI.exitApp();
      }
    </script>
  </body>
</html>
