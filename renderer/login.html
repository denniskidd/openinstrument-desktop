<!DOCTYPE html>
<html>
  <head>
    <title>Instrument Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="relative bg-gray-900 text-white font-sans h-screen w-screen flex flex-col items-center justify-center space-y-8"
  >
    <h1 class="text-4xl font-bold mb-4">Activation Code</h1>
    <input
      id="instrumentId"
      type="text"
      placeholder=""
      class="w-1/2 p-4 text-black text-xl rounded-md"
    />
    <button
      id="saveButton"
      onclick="save()"
      class="border border-white text-white py-3 px-6 text-2xl rounded-full hover:bg-white hover:text-gray-900 transition opacity-50 cursor-not-allowed"
      disabled
    >
      Save
    </button>

    <div class="absolute bottom-8 left-12 flex flex-col space-y-2">
      <div class="shrink-0 flex items-center">
        <div class="flex items-center">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="block text-gray-100 h-12 w-auto"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            {{
            $attributes
            }}
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 6.878V6a2.25 2.25 0 012.25-2.25h7.5A2.25 2.25 0 0118 6v.878m-12 0c.235-.083.487-.128.75-.128h10.5c.263 0 .515.045.75.128m-12 0A2.25 2.25 0 004.5 9v.878m13.5-3A2.25 2.25 0 0119.5 9v.878m0 0a2.246 2.246 0 00-.75-.128H5.25c-.263 0-.515.045-.75.128m15 0A2.25 2.25 0 0121 12v6a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 18v-6c0-.98.626-1.813 1.5-2.122"
            />
          </svg>
          <p class="text-gray-100 p-2 font-semibold text-2xl">OpenInstrument</p>
        </div>
        <div class="ml-4">
          <img
            src="assets/JHU.logo_horizontal.white.svg"
            alt="Logo"
            class="h-16 w-auto border-l pl-4"
          />
        </div>
      </div>
    </div>
    <script>
      async function save() {
        const id = document.getElementById("instrumentId").value.trim();
        const uuidRegex =
          /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
        const saveBtn = document.getElementById("saveButton");

        if (!uuidRegex.test(id)) {
          alert("Please enter a valid UUID.");
          return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 inline" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
          </svg> Verifying...`;

        try {
          const response = await fetch(
            `https://openinstrument.com/api/instruments/${id}`
          );

          if (!response.ok) {
            throw new Error("Instrument not found.");
          }

          const instrument = await response.json();

          if (!instrument.desktop_enabled) {
            alert("This instrument has not been enabled for desktop use. Please contact your administrator.");
            saveBtn.innerText = "Save";
            saveBtn.disabled = false;
            return;
          }

          // Now save the UUID + instrument info
          window.electronAPI.sendToken(
            `save-instrument:${JSON.stringify({
              instrumentUuid: id,
              instrumentName: instrument.name,
              instrumentDescription: instrument.description,
            })}`
          );
          // No need to reset the button, as navigation will occur
        } catch (error) {
          alert("Instrument could not be verified. Please check your UUID.");
          saveBtn.innerText = "Save";
          saveBtn.disabled = false;
        }
      }

      const input = document.getElementById("instrumentId");
      const saveBtn = document.getElementById("saveButton");
      const uuidRegex =
        /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;

      input.addEventListener("input", () => {
        if (uuidRegex.test(input.value.trim())) {
          saveBtn.disabled = false;
          saveBtn.classList.remove("opacity-50", "cursor-not-allowed");
        } else {
          saveBtn.disabled = true;
          saveBtn.classList.add("opacity-50", "cursor-not-allowed");
        }
      });

      function exitApp() {
        window.electronAPI.exitApp();
      }
    </script>
    <button
      id="exitButton"
      onclick="exitApp()"
      class="absolute bottom-8 right-12 border border-red-500 text-red-500 py-3 px-6 text-2xl rounded-full hover:bg-red-500 hover:text-white transition"
    >
      Exit
    </button>
  </body>
</html>
