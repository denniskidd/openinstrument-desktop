<!DOCTYPE html>
<html>
  <head>
    <title>Session Active</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #09090b;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 15px;
        height: 100vh;
        overflow: hidden;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      #container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 100%;
        padding: 0 1.5rem;
        -webkit-app-region: drag;
      }
      .left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: #7069DA;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 600;
        flex-shrink: 0;
        color: #fff;
      }
      #username {
        font-weight: 500;
        color: #e4e4e7;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .center {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .online-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.35);
        border-radius: 999px;
        padding: 3px 10px 3px 8px;
        font-size: 12px;
        color: #4ade80;
        font-weight: 500;
      }
      .pulse-dot {
        width: 7px;
        height: 7px;
        background: #4ade80;
        border-radius: 50%;
        flex-shrink: 0;
        animation: pulse 1.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.4; transform: scale(0.75); }
      }
      #timer {
        font-size: 15px;
        font-weight: 600;
        color: #e4e4e7;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.02em;
      }
      #timer.expired {
        color: #f87171;
      }
      .right {
        display: flex;
        align-items: center;
        -webkit-app-region: no-drag;
      }
      button.end-btn {
        background: transparent;
        border: 1px solid rgba(239, 68, 68, 0.6);
        color: #f87171;
        padding: 6px 16px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 6px;
        font-family: inherit;
        transition: background 0.15s, border-color 0.15s;
        -webkit-app-region: no-drag;
      }
      button.end-btn:hover {
        background: rgba(239, 68, 68, 0.15);
        border-color: rgba(239, 68, 68, 0.9);
      }

    </style>
  </head>
  <body>
    <div id="container">
      <div class="left">
        <div class="avatar" id="avatar">?</div>
        <span id="username">...</span>
      </div>
      <div class="center">
        <span class="online-badge"><span class="pulse-dot"></span>Session Active</span>
        <span id="timer">00:00:00</span>
      </div>
      <div class="right">
        <button class="end-btn" onclick="promptStopSession()">End Session</button>
      </div>
    </div>


    <script>
      let token, sessionId, instrumentUuid;
      let startTime, timerInterval;

      window.electronAPI.onSessionInfo((data) => {
        const name = data?.username?.trim() || 'User';
        document.getElementById("username").innerText = name;
        document.getElementById("avatar").innerText = name.charAt(0).toUpperCase();

        token = data.token;
        sessionId = data.sessionId;
        instrumentUuid = data.instrumentUuid;

        startTime = new Date();
        timerInterval = setInterval(updateTimer, 1000);
      });

      function updateTimer() {
        const diff = Math.floor((new Date() - startTime) / 1000);
        const h = String(Math.floor(diff / 3600)).padStart(2, "0");
        const m = String(Math.floor((diff % 3600) / 60)).padStart(2, "0");
        const s = String(diff % 60).padStart(2, "0");
        document.getElementById("timer").innerText = `${h}:${m}:${s}`;
      }

      function promptStopSession() {
        window.electronAPI.showEndConfirm({ token, sessionId });
      }
    </script>
  </body>
</html>
