<!DOCTYPE html>
<html>
  <head>
    <title>Session Active</title>
    <style>
      body {
        background: #222;
        color: #fff;
        font-family: sans-serif;
        font-size: 20px;
      }
      #container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 100vw;
        box-sizing: border-box;
        -webkit-app-region: drag;
        padding: 1rem 1.5rem;
      }
      button {
        background: red;
        border: none;
        padding: 8px 16px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        border-radius: 8px;
        -webkit-app-region: no-drag;
      }
      .online-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid rgba(34, 197, 94, 0.4);
        border-radius: 999px;
        padding: 3px 10px 3px 8px;
        font-size: 14px;
        color: #4ade80;
        font-weight: 500;
        vertical-align: middle;
        margin-right: 8px;
      }
      .pulse-dot {
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
        flex-shrink: 0;
        animation: pulse 1.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(0.75); }
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div><span id="username">...</span></div>
      <div>
        <span class="online-badge"><span class="pulse-dot"></span>Online</span>
        Session Active — <span id="timer">00:00</span>
      </div>
      <div>
        <button onclick="stopSession()">Stop</button>
      </div>
    </div>

    <script>
      let token, sessionId;
      let startTime, endTime, timerInterval;

      window.electronAPI.onSessionInfo((data) => {
        document.getElementById("username").innerText =
          data?.username?.trim() || "User";
        token = data.token;
        sessionId = data.sessionId;
        const toUtc = (str) => /Z|[+-]\d{2}:?\d{2}$/.test(str) ? str : str.replace(' ', 'T') + 'Z';
        endTime = new Date(toUtc(data.endTime));

        startTime = new Date();
        timerInterval = setInterval(updateTimer, 1000);

        //check for admin status
        let isAdmin = false;

        async function checkAdminStatus() {
          try {
            const response = await fetch(
              `https://openinstrument.com/api/instruments/${instrumentUuid}/admin-check`,
              {
                headers: {
                  Authorization: `Bearer ${token}`,
                },
              }
            );

            if (response.ok) {
              const data = await response.json();
              isAdmin = data.is_admin;
              if (isAdmin) {
                document.getElementById("bypassButton").style.display = "block";
              }
            } else {
              console.error("Failed to check admin status.");
            }
          } catch (err) {
            console.error("Error checking admin status:", err);
          }
        }
      });

      let sessionExpired = false;

      function updateTimer() {
        const now = new Date();
        const diff = Math.floor((now - startTime) / 1000);

        const hours = String(Math.floor(diff / 3600)).padStart(2, "0");
        const minutes = String(Math.floor((diff % 3600) / 60)).padStart(2, "0");
        const seconds = String(diff % 60).padStart(2, "0");

        const timerEl = document.getElementById("timer");
        timerEl.innerText = `${hours}:${minutes}:${seconds}`;

        if (endTime && now > endTime && !sessionExpired) {
          timerEl.style.color = "red";
          sessionExpired = true;
        }
      }

      function stopSession() {
        if (confirm("Are you sure you want to stop the session?")) {
          clearInterval(timerInterval);
          window.electronAPI.sendStopSession({ token, sessionId });
        }
      }
    </script>
  </body>
</html>
